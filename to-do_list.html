<!DOCTYPE html>

<html>
    <head>
        <title>To-Do List</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <h1>To-Do List</h1>

            <div class = "input-group">
                <input type="text" id="taskInput" placeholder="Escriba una nueva tarea...">
                <button id="addTaskBtn">Agregar Tarea</button>
            </div>

            <ul id="taskList"></ul>
        </div>
        <!-- Llamamos a nuestro archivo de JavaScript para agregar interactividad a nuestra página web con la siguiente linea-->
        <script src="to-do_script.js"></script> 
    </body>
</html>
